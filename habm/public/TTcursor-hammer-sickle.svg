<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Hammer handle -->
  <rect x="14" y="2" width="4" height="16" fill="#FFD700" stroke="#333" stroke-width="0.5"/>
  
  <!-- Hammer head -->
  <rect x="10" y="0" width="12" height="6" rx="1" fill="#FFD700" stroke="#333" stroke-width="0.5"/>
  
  <!-- Sickle curve (using path for the curved sickle shape) -->
  <path d="M 6 14 Q 2 18 6 22 Q 10 24 14 20" fill="none" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Sickle handle -->
  <rect x="12" y="18" width="3" height="10" fill="#FFD700" stroke="#333" stroke-width="0.5"/>
  
  <!-- Small star or accent -->
  <circle cx="16" cy="16" r="1.5" fill="#FF0000"/>
</svg>