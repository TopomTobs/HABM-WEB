<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Markus Hablesreiter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <button id="burger" class="burger" aria-label="Menü">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <h1 class="site-title">Portfolio</h1>
    </header>

    <!-- Password Modal -->
    <div id="passwordModal" class="password-modal-overlay">
        <div class="password-modal">
            <h2>Zugriff erforderlich</h2>
            <p>Bitte geben Sie das Passwort ein:</p>
            <input type="password" id="passwordInput" placeholder="Passwort" />
            <button id="passwordBtn">Bestätigen</button>
            <div id="passwordError" class="password-error"></div>
        </div>
    </div>

    <nav id="sidebar" class="sidebar" aria-label="Personenavigation">
        <div class="nav-header">
            <h2>Personen</h2>
        </div>
        <ul id="personList" class="person-list">
            <!-- Wird von JavaScript gefüllt -->
        </ul>
        <div class="sidebar-footer">
            <p class="soviet-tag">De Maschienenbau Klassn brauch ma ned Hazn, de san söba woam</p>
        </div>
    </nav>

    <main id="content" class="content" role="main">
        <!-- Inhalte werden dynamisch geladen -->
    </main>

    <script src="./app/app.js"></script>


</body>
</html>
